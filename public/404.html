<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Music Selector</title>
    <script>
      // GitHub Pages SPA redirect for HashRouter
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin + '/#' + path + search + hash
      );
    </script>
  </head>
  <body></body>
</html>
